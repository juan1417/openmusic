name: openmusic
description: A Spotify-like music app prototype with YouTube catalog integration and selectable audio quality.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.5.5
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.2
  dio: ^5.4.1
  ffmpeg_kit_flutter_full: ^6.0.3
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  json_annotation: ^4.11.0
  just_audio: ^0.10.5
  youtube_explode_dart: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.14.1
  json_serializable: ^6.13.1
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
